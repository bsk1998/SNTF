<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload Documents — SNTF Admin</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:linear-gradient(135deg,#06060A 0%,#0E0E16 50%,#1a1a2e 100%);min-height:100vh;display:flex;justify-content:center;align-items:flex-start;padding:30px 20px;}
.card{background:rgba(255,255,255,0.97);border-radius:20px;box-shadow:0 24px 80px rgba(0,0,0,0.5);padding:36px 32px;width:100%;max-width:680px;}
.logo{text-align:center;margin-bottom:28px;}
.logo h1{font-size:32px;font-weight:900;letter-spacing:6px;background:linear-gradient(135deg,#8B0013,#C0001A,#E8001F);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.logo p{color:#888;font-size:12px;letter-spacing:3px;text-transform:uppercase;margin-top:4px;}
.auth-box{background:#f8f8ff;border:1px solid #e0e0f0;border-radius:12px;padding:16px 18px;margin-bottom:22px;display:flex;align-items:center;gap:12px;}
.auth-box label{font-size:12px;font-weight:700;color:#555;white-space:nowrap;letter-spacing:1px;}
.auth-box input{flex:1;padding:9px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;outline:none;transition:border-color 0.2s;}
.auth-box input:focus{border-color:#C0001A;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:11px;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;}
.field select{width:100%;padding:9px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;outline:none;background:#fff;transition:border-color 0.2s;}
.field select:focus{border-color:#C0001A;}
.drop-zone{border:2.5px dashed #C0001A;border-radius:14px;padding:32px 20px;text-align:center;cursor:pointer;transition:all 0.25s;margin-bottom:18px;background:rgba(192,0,26,0.02);}
.drop-zone:hover,.drop-zone.drag-over{background:rgba(192,0,26,0.06);border-color:#8B0013;transform:scale(1.01);}
.drop-icon{font-size:42px;margin-bottom:10px;}
.drop-text{font-size:16px;font-weight:600;color:#333;margin-bottom:6px;}
.drop-sub{font-size:12px;color:#999;}
.drop-sub span{background:#C0001A;color:#fff;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;margin:0 2px;}
input[type="file"]{display:none;}
#file-queue{margin-bottom:18px;}
.file-row{display:flex;align-items:center;gap:10px;background:#f9f9f9;border:1px solid #eee;border-radius:10px;padding:10px 14px;margin-bottom:8px;transition:all 0.2s;}
.file-row.done{border-color:#22c55e;background:#f0fdf4;}
.file-row.error{border-color:#ef4444;background:#fff5f5;}
.file-row.uploading{border-color:#C0001A;background:#fff8f8;}
.file-icon{font-size:22px;flex-shrink:0;}
.file-info{flex:1;min-width:0;}
.file-name-input{width:100%;border:none;background:transparent;font-size:13px;font-weight:600;color:#333;outline:none;border-bottom:1px dashed transparent;transition:border-color 0.2s;}
.file-name-input:focus{border-bottom-color:#C0001A;}
.file-size{font-size:11px;color:#999;margin-top:2px;}
.prog-bar-wrap{height:4px;background:#eee;border-radius:2px;margin-top:6px;}
.prog-bar{height:100%;background:linear-gradient(90deg,#C0001A,#ff4d4d);border-radius:2px;width:0%;transition:width 0.4s;}
.file-status{font-size:12px;font-weight:600;flex-shrink:0;min-width:80px;text-align:right;}
.file-status.ok{color:#22c55e;}
.file-status.err{color:#ef4444;}
.file-status.wait{color:#999;}
.file-status.run{color:#C0001A;}
.file-remove{background:none;border:none;cursor:pointer;color:#ccc;font-size:16px;padding:0 4px;transition:color 0.2s;flex-shrink:0;}
.file-remove:hover{color:#ef4444;}
.btn-row{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;}
.btn-upload{flex:1;min-width:180px;padding:13px;background:linear-gradient(135deg,#C0001A,#8B0013);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;letter-spacing:1px;cursor:pointer;transition:all 0.3s;}
.btn-upload:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 6px 20px rgba(192,0,26,0.35);}
.btn-upload:disabled{opacity:0.4;transform:none;cursor:default;}
.btn-add{padding:13px 18px;background:#f5f5f5;border:1px solid #ddd;border-radius:10px;font-size:14px;cursor:pointer;transition:all 0.2s;color:#555;font-weight:600;}
.btn-add:hover{background:#eee;}
.btn-clear{padding:13px 14px;background:#fff;border:1px solid #fca5a5;border-radius:10px;font-size:14px;cursor:pointer;transition:all 0.2s;color:#ef4444;}
.btn-clear:hover{background:#fff5f5;}
#summary{border-radius:10px;padding:14px 16px;display:none;margin-bottom:14px;font-size:13px;font-weight:500;}
.back{display:block;text-align:center;margin-top:10px;color:#C0001A;text-decoration:none;font-size:13px;letter-spacing:1px;opacity:0.7;transition:opacity 0.2s;}
.back:hover{opacity:1;}
@media(max-width:500px){.card{padding:24px 16px;}.btn-row{flex-direction:column;}}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>SNTF</h1>
    <p>Administration — Upload Documents</p>
  </div>

  <div class="auth-box">
    <label>🔑 CLÉ ADMIN</label>
    <input type="password" id="adminKey" placeholder="Clé administrateur...">
  </div>

  <div class="field">
    <label>Catégorie (appliquée à tous les fichiers)</label>
    <select id="docCat">
      <option value="General">Général</option>
      <option value="Reglements">Règlements</option>
      <option value="Procedures">Procédures</option>
      <option value="Technique">Technique</option>
      <option value="Formation">Formation</option>
      <option value="Securite">Sécurité</option>
      <option value="RH">Ressources Humaines</option>
    </select>
  </div>

  <div class="drop-zone" id="dropZone">
    <div class="drop-icon">📂</div>
    <div class="drop-text">Glissez vos fichiers ici ou cliquez pour sélectionner</div>
    <div class="drop-sub">
      <span>PDF</span> <span>JPG</span> <span>PNG</span> <span>WEBP</span>
      — Plusieurs fichiers à la fois
    </div>
  </div>
  <input type="file" id="fileInput" accept=".pdf,.jpg,.jpeg,.png,.webp" multiple>

  <div id="file-queue"></div>

  <div class="btn-row">
    <button class="btn-upload" id="btnUpload" disabled onclick="uploadAll()">📤 Indexer les fichiers</button>
    <button class="btn-add" onclick="document.getElementById('fileInput').click()">➕ Ajouter</button>
    <button class="btn-clear" id="btnClear" onclick="clearQueue()" style="display:none">🗑</button>
  </div>

  <div id="summary"></div>
  <a href="/" class="back">← Retour au chat</a>
</div>

<script>
var dropZone  = document.getElementById('dropZone');
var fileInput = document.getElementById('fileInput');
var queueEl   = document.getElementById('file-queue');
var btnUpload = document.getElementById('btnUpload');
var btnClear  = document.getElementById('btnClear');
var summaryEl = document.getElementById('summary');

var fileQueue    = [];
var isUploading  = false;

dropZone.addEventListener('click', function(){ fileInput.click(); });
dropZone.addEventListener('dragover', function(e){ e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', function(){ dropZone.classList.remove('drag-over'); });
dropZone.addEventListener('drop', function(e){
  e.preventDefault(); dropZone.classList.remove('drag-over');
  addFiles(Array.from(e.dataTransfer.files));
});
fileInput.addEventListener('change', function(e){
  addFiles(Array.from(e.target.files)); fileInput.value = '';
});

function getIcon(file){
  if(file.type==='application/pdf') return '📄';
  if(file.type.startsWith('image/')) return '🖼️';
  return '📎';
}
function fmtSize(b){
  if(b<1024) return b+' B';
  if(b<1048576) return (b/1024).toFixed(1)+' KB';
  return (b/1048576).toFixed(1)+' MB';
}

function addFiles(files){
  var allowed = ['application/pdf','image/jpeg','image/png','image/webp'];
  var exts    = ['pdf','jpg','jpeg','png','webp'];
  files.forEach(function(file){
    var ext = file.name.split('.').pop().toLowerCase();
    if(!allowed.includes(file.type) && !exts.includes(ext)){
      alert('❌ '+file.name+' — format non accepté'); return;
    }
    var id = 'f'+(Date.now()+Math.random()).toString(36);
    var defName = file.name.replace(/\.[^.]+$/,'');
    var row = document.createElement('div');
    row.className = 'file-row'; row.id = 'row-'+id;
    row.innerHTML =
      '<span class="file-icon">'+getIcon(file)+'</span>'+
      '<div class="file-info">'+
        '<input class="file-name-input" type="text" id="name-'+id+'" value="'+defName+'" placeholder="Nom du document">'+
        '<div class="file-size">'+file.name+' — '+fmtSize(file.size)+'</div>'+
        '<div class="prog-bar-wrap"><div class="prog-bar" id="prog-'+id+'"></div></div>'+
      '</div>'+
      '<span class="file-status wait" id="st-'+id+'">En attente</span>'+
      '<button class="file-remove" onclick="removeFile(\''+id+'\')" title="Supprimer">✕</button>';
    queueEl.appendChild(row);
    fileQueue.push({file:file, id:id, done:false, error:false, chunks:0});
  });
  updateUI();
}

function removeFile(id){
  fileQueue = fileQueue.filter(function(f){ return f.id !== id; });
  var row = document.getElementById('row-'+id);
  if(row) row.remove();
  updateUI();
}

function clearQueue(){
  fileQueue = []; queueEl.innerHTML = '';
  summaryEl.style.display = 'none';
  updateUI();
}

function updateUI(){
  btnUpload.disabled = fileQueue.length === 0 || isUploading;
  btnClear.style.display = fileQueue.length > 0 ? '' : 'none';
  var n = fileQueue.length;
  btnUpload.textContent = n > 0 ? '📤 Indexer '+n+' fichier'+(n>1?'s':'') : '📤 Indexer les fichiers';
}

async function uploadOne(item){
  var adminKey = document.getElementById('adminKey').value.trim();
  var category = document.getElementById('docCat').value;
  var nameEl   = document.getElementById('name-'+item.id);
  var stEl     = document.getElementById('st-'+item.id);
  var progEl   = document.getElementById('prog-'+item.id);
  var rowEl    = document.getElementById('row-'+item.id);
  var docName  = nameEl ? nameEl.value.trim() || item.file.name : item.file.name;

  if(stEl)  { stEl.textContent='⏳ Upload...'; stEl.className='file-status run'; }
  if(progEl)  progEl.style.width='20%';
  if(rowEl)   rowEl.className='file-row uploading';

  var fd = new FormData();
  fd.append('file', item.file);
  fd.append('document_name', docName);
  fd.append('category', category);
  fd.append('admin_key', adminKey);

  if(progEl) progEl.style.width='50%';

  try {
    var res  = await fetch('/api/documents/upload', {method:'POST', body:fd});
    var data = await res.json();
    if(res.ok && data.success){
      item.done = true; item.chunks = data.chunks_stored || 0;
      if(progEl) progEl.style.width='100%';
      if(stEl)   { stEl.textContent='✅ '+item.chunks+' chunks'; stEl.className='file-status ok'; }
      if(rowEl)  rowEl.className='file-row done';
    } else {
      throw new Error(data.detail || 'Erreur serveur');
    }
  } catch(e){
    item.error = true;
    if(progEl) { progEl.style.width='100%'; progEl.style.background='#ef4444'; }
    if(stEl)   { stEl.textContent='❌ Échec'; stEl.className='file-status err'; stEl.title=e.message; }
    if(rowEl)  rowEl.className='file-row error';
  }
}

async function uploadAll(){
  var adminKey = document.getElementById('adminKey').value.trim();
  if(!adminKey){ alert('⚠️ Entrez la clé administrateur !'); return; }
  if(fileQueue.length===0){ alert('⚠️ Ajoutez des fichiers !'); return; }

  isUploading = true;
  btnUpload.disabled = true;
  btnUpload.textContent = '⏳ Indexation en cours...';
  summaryEl.style.display = 'none';

  var toUpload = fileQueue.filter(function(f){ return !f.done && !f.error; });
  for(var i=0; i<toUpload.length; i++){
    await uploadOne(toUpload[i]);
  }

  isUploading = false;

  var done   = fileQueue.filter(function(f){ return f.done; });
  var errors = fileQueue.filter(function(f){ return f.error; });
  var chunks = done.reduce(function(s,f){ return s+(f.chunks||0); }, 0);

  summaryEl.style.display = 'block';
  if(errors.length===0){
    summaryEl.style.cssText = 'background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:14px 16px;margin-bottom:14px;font-size:13px;font-weight:500;color:#166534;';
    summaryEl.innerHTML = '✅ <strong>'+done.length+' fichier'+(done.length>1?'s':'')+' indexé'+(done.length>1?'s':'')+'</strong> avec succès — <strong>'+chunks+' chunks</strong> ajoutés dans Supabase.';
  } else {
    summaryEl.style.cssText = 'background:#fff5f5;border:1px solid #fca5a5;border-radius:10px;padding:14px 16px;margin-bottom:14px;font-size:13px;font-weight:500;color:#991b1b;';
    summaryEl.innerHTML = '⚠️ '+done.length+' réussi'+(done.length>1?'s':'')+', <strong>'+errors.length+' échec'+(errors.length>1?'s':'')+'</strong> — vérifiez la clé admin et réessayez les fichiers en rouge.';
  }

  updateUI();
  btnUpload.textContent = done.length>0 ? '✅ '+done.length+' indexé'+(done.length>1?'s':'') : '📤 Réessayer';
  btnUpload.disabled = false;
}

document.getElementById('adminKey').focus();
</script>
</body>
</html>
